services: # Docker Compose 服务集合。
  chatgpt-on-wechat: # 小悠本体服务名；执行 compose 命令时使用这个名称。
    image: cow-legacy-local:vision-no-think # 本地构建的小悠镜像名称与标签。
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cow-legacy # 固定容器名；观测台的最小权限控制器依赖此名称。
    restart: always # 容器退出或 Docker 重启后自动拉起；手动 stop 后需手动 start。
    security_opt: # 容器安全配置列表。
      - seccomp:unconfined # 放宽 seccomp 以兼容个人微信 Web 登录库；会降低容器隔离强度。
    volumes: # 宿主机持久化目录挂载。
      - ./plugins:/app/plugins # 插件源码热挂载；修改插件通常无需重建镜像。
      - ./data:/app/data # 微信登录态和运行数据持久化；禁止提交到 Git。
      - ./patches/chat_channel.py:/app/channel/chat_channel.py:ro # 核心消息链路与当前仓库保持同版，避免旧镜像混装新插件。
      - ./patches/chat_gpt_bot.py:/app/bot/chatgpt/chat_gpt_bot.py:ro # 核心模型适配层与当前仓库保持同版。
    environment: # 以下全部是容器环境变量；秒数类参数均以 seconds 为单位。

      # ===== 基础运行与微信通道 =====
      CHANNEL_TYPE: 'wx' # 使用个人微信 itchat/WebWx 通道。
      HOT_RELOAD: 'true' # 允许框架热加载插件配置；关键环境变量变更仍需重建容器。
      APPDATA_DIR: '/app/data' # 容器内登录态与应用数据目录，对应上面的 ./data 挂载。
      XIAOYOU_APP_ENABLED: '${XIAOYOU_APP_ENABLED:-false}' # 默认关闭；配置长随机令牌并完成 HTTPS 反代后再开启。
      XIAOYOU_APP_TOKEN: '${XIAOYOU_APP_TOKEN:-}' # App Bearer 令牌；至少24字符，禁止写入客户端源码或提交仓库。
      XIAOYOU_APP_HOST: '0.0.0.0' # 容器内监听地址；宿主机端口仍只绑定127.0.0.1。
      XIAOYOU_APP_PORT: '8787' # App HTTP/SSE 服务端口。
      XIAOYOU_APP_DB_PATH: '/app/data/app_channel/app.db' # App设备、输入幂等、输出收件箱和送达回执。
      XIAOYOU_APP_DEFAULT_PROACTIVE: '${XIAOYOU_APP_DEFAULT_PROACTIVE:-false}' # 无明确来源的主动消息默认仍走微信；开启后优先进入最近App设备收件箱。
      XIAOYOU_APP_VOICE_ENABLED: '${XIAOYOU_APP_VOICE_ENABLED:-true}' # 只启用App录音转写与语音回复；不改变微信语音开关。
      XIAOYOU_APP_ASR_MODEL: 'qwen3-asr-flash' # App短语音同步识别，结果作为用户原话进入现有对话链路。
      XIAOYOU_APP_TTS_MODEL: 'cosyvoice-v3-flash' # App专属语音回复模型；与longyan_v3音色匹配。
      XIAOYOU_APP_TTS_VOICE: 'longyan_v3' # 温暖温柔的女声，仅App语音输入触发。
      XIAOYOU_APP_VOICE_TIMEOUT: '45' # 单次识别、合成或音频下载最多等待45秒。
      XIAOYOU_APP_VOICE_MAX_BYTES: '6291456' # 单条App录音最多6MiB；客户端同时限制60秒。
      XIAOYOU_APP_IMAGE_MAX_BYTES: '8388608' # App上传图片或表情包最大8MiB；Nginx需同步允许8m。
      SHORT_MEMORY_STATE_PATH: '/app/data/short_memory/short_memory.json' # 短期记忆主文件；备份写入同目录。
      REMINDER_LOVE_STATE_PATH: '/app/data/reminder_love/reminders.json' # 提醒任务状态。
      PROACTIVE_LOVE_STATE_PATH: '/app/data/proactive_love/proactive_state.json' # 主动消息调度状态。
      CONVERSATION_FOLLOWUP_STATE_PATH: '/app/data/conversation_followup/followup_state.json' # 中断追问状态。
      XIAOYOU_IDENTITY_STATE_PATH: '/app/data/xiaoyou_identity/state.json' # 稳定身份映射状态。
      XIAOYOU_RECOVERY_STATE_PATH: '/app/data/xiaoyou_chat/recovery_state.json' # 模型中断后的重连状态。
      XIAOYOU_RECENT_STATE_PATH: '/app/data/xiaoyou_recent_state/state.json' # 当前话题、指代和未完事项。
      XIAOYOU_INNER_STATE_PATH: '/app/data/xiaoyou_inner_state/state.json' # 小悠短时内在状态。
      XIAOYOU_LIFE_PHOTO_STATE_PATH: '/app/data/xiaoyou_life_photo/state.json' # 生活照会话状态。
      XIAOYOU_CONVERSATION_ARCHIVE_PATH: '/app/data/xiaoyou_conversation/conversation.db' # 原始对话与情节记忆数据库。
      TZ: 'Asia/Shanghai' # 容器时区；影响现实时间、提醒、主动消息和日志时间。
      XIAOYOU_RELATIONSHIP_PROFILE_PATH: '/app/data/xiaoyou_profile/relationship_profile.json' # 私密人物与关系档案路径；位于data挂载中，不提交到Git。
      XIAOYOU_CALENDAR_ATTENTION_HOUR: '8' # 重要日期当天8点后给统一主动中枢一次感知机会，不代表固定发送祝福。

      # ===== 稳定身份映射 =====
      XIAOYOU_IDENTITY_ENABLED: 'true' # 启用稳定身份层，把微信临时 @ID 映射为固定会话。
      XIAOYOU_CANONICAL_SESSION_ID: 'yoyo' # 小悠内部永久使用的唯一会话ID；不要填写微信临时 @ID。
      XIAOYOU_LEGACY_SESSION_IDS: '${XIAOYOU_LEGACY_SESSION_IDS:-}' # 旧微信临时ID列表，用于首次迁移历史状态；多个值按插件支持的分隔格式填写。
      XIAOYOU_IDENTITY_REQUIRE_CANONICAL: 'true' # 仅允许固定会话触发小悠能力，防止误作用到其他联系人。
      XIAOYOU_IDENTITY_PRUNE_SHORT_MEMORY: 'true' # 单用户模式下裁掉非 yoyo 的短期记忆；多人部署必须关闭并重做隔离。
      XIAOYOU_IDENTITY_REFRESH_SECONDS: '30' # 每30秒刷新目标联系人和当前微信收件人映射。
      XIAOYOU_TARGET_WECHAT_ALIAS: '${XIAOYOU_TARGET_WECHAT_ALIAS:-}' # 可选微信号 Alias 锚点；最稳定，留空时自动学习。
      XIAOYOU_TARGET_REMARK_NAME: '${XIAOYOU_TARGET_REMARK_NAME:-}' # 可选联系人备注名锚点；备注变化后需同步修改。
      XIAOYOU_TARGET_NICKNAME: '${XIAOYOU_TARGET_NICKNAME:-}' # 可选昵称锚点；重名时不如 Alias 安全。

      # ===== 会话协调与全链路追踪 =====
      XIAOYOU_COORDINATOR_ENABLED: 'true' # 启用动作协调中枢，处理提醒、重连、追问和主动消息竞争。
      XIAOYOU_TRACE_ENABLED: 'true' # 启用匿名化 Trace；记录状态和耗时，不记录聊天正文与密钥。
      XIAOYOU_TRACE_MAX_TRACES: '200' # 内存中最多保留200条最近 Trace，越大占用内存越多。
      XIAOYOU_TRACE_MAX_EVENTS: '80' # 每条 Trace 最多保留80个阶段事件。
      XIAOYOU_COORDINATOR_CLAIM_TTL_SECONDS: '300' # 自主动作租约最长保留300秒，超时后自动失效。
      XIAOYOU_COORDINATOR_INPUT_SETTLE_SECONDS: '3' # 收到新输入后等待3秒稳定，再允许自主动作竞争。
      XIAOYOU_COORDINATOR_AUTONOMOUS_GAP_SECONDS: '120' # 两次自主动作至少间隔120秒，避免不同插件连续打扰。

      # ===== 主聊天模型 =====
      MODEL: 'qwen3.7-max' # 上游框架默认模型；未指定专用模型的能力会继承它。
      OPEN_AI_API_KEY: '${KEY}' # 百炼/OpenAI兼容接口密钥，来自宿主机 .env 的 KEY，禁止写死。
      OPEN_AI_API_BASE: 'https://dashscope.aliyuncs.com/compatible-mode/v1' # 阿里云百炼 OpenAI 兼容接口根地址。
      ENABLE_THINKING: 'true' # 上游框架全局思考开关。
      XIAOYOU_ENABLE_THINKING: 'true' # 小悠统一模型网关的默认思考开关。
      XIAOYOU_THINKING_BUDGET: '4096' # 支持该参数的模型最多使用4096个思考Token；越大越慢且更耗额度。
      XIAOYOU_CHAT_MODEL: 'qwen3.7-max' # 小悠普通文字聊天使用的模型。
      XIAOYOU_CHAT_ENABLE_THINKING: 'true' # 普通聊天启用思考，提高理解力但会增加延迟。
      XIAOYOU_CHAT_ADAPTIVE_THINKING_ENABLED: 'true' # 简短日常聊天关闭慢思考；分析、技术和多段复杂输入仍保留思考。
      XIAOYOU_CHAT_THINKING_MIN_CHARS: '90' # 本轮可见输入达到90字符时自动保留深度思考。
      XIAOYOU_CHAT_MAX_TOKENS: '700' # 日常回复通常很短，但复杂分析可以自然展开到预留的完整输出预算。
      XIAOYOU_CONTEXT_MAX_CHARS: '7000' # 普通聊天动态 ContextPack 总预算；不含系统人格提示。
      XIAOYOU_CONTEXT_CURRENT_MAX_CHARS: '4000' # 本轮连续输入最多保留4000字符，超长时保留首尾。
      XIAOYOU_CONTEXT_RECENT_STATE_MAX_CHARS: '1600' # 当前话题、临时状态、未完事项和指代的短时状态上限。
      XIAOYOU_CONTEXT_SHORT_MAX_CHARS: '3600' # 近期原话与短摘要分区上限；预算不足时优先保留最新行。
      XIAOYOU_CONTEXT_EPISODIC_MAX_CHARS: '3600' # 跨时段情节摘要与相关原始邻接片段上限。
      XIAOYOU_CONTEXT_LONG_MAX_CHARS: '2600' # 长期记忆分区上限；预算不足时优先保留检索排名靠前项。
      XIAOYOU_CONTEXT_UPSTREAM_MAX_CHARS: '1600' # 旧插件未提供结构化分区时的兼容上下文上限。
      XIAOYOU_MODEL_CONTEXT_TOKENS: '16384' # 主聊天模型上下文窗口；规划器会先扣除系统、输出和思考预留。
      XIAOYOU_SYSTEM_RESERVED_TOKENS: '2600' # 人格与系统规则预留，避免动态上下文把系统提示挤出窗口。
      XIAOYOU_OUTPUT_RESERVED_TOKENS: '700' # 回复与协议开销预留；与复杂回复的实际输出上限保持一致。
      XIAOYOU_THINKING_RESERVED_TOKENS: '1200' # 复杂轮启用思考时额外预留；闲聊关闭思考后自动释放。
      XIAOYOU_CONTEXT_MAX_TOKENS: '6000' # 动态 ContextPack 的全局硬上限；查询规划器还会按意图进一步缩小。
      XIAOYOU_CONTEXT_CURRENT_MAX_TOKENS: '1800' # 本轮可见输入的独立 token 上限，始终拥有最高权威。
      XIAOYOU_CONTEXT_RECENT_STATE_MAX_TOKENS: '900' # RecentState 独立 token 上限，避免临时状态膨胀。
      XIAOYOU_CONTEXT_SHORT_MAX_TOKENS: '2600' # 工作记忆/近期对话 token 上限。
      XIAOYOU_CONTEXT_EPISODIC_MAX_TOKENS: '1800' # 历史情节检索分区 token 上限。
      XIAOYOU_CONTEXT_LONG_MAX_TOKENS: '1800' # 长期记忆 token 上限。
      XIAOYOU_CONTEXT_UPSTREAM_MAX_TOKENS: '700' # 旧式上游兼容区 token 上限。
      XIAOYOU_NATIVE_HISTORY_MAX_MESSAGES: '400' # 与ActiveWindow读取上限一致；实际长度主要由4500 token控制，不让高频短消息先撞条数墙。
      XIAOYOU_NATIVE_HISTORY_MAX_TOKENS: '4500' # 最近原话独立token上限，保证短期精确且不挤占系统与输出预算。
      XIAOYOU_NATIVE_HISTORY_RESERVED_TOKENS: '4500' # ContextPlanner先为原生多轮预留同等空间，避免与ContextPack合计超过模型窗口。
      XIAOYOU_CONTENT_RECOVERY_HISTORY_MESSAGES: '12' # 内容审查恢复先保留最近12条原生对话，再按指代相关性逐级缩减。
      XIAOYOU_CONTENT_RECOVERY_MAX_ATTEMPTS: '4' # 仅在整包被供应商拒绝时尝试完整近期、指代锚点、紧凑近期和当前消息。
      XIAOYOU_SELECTIVE_CRITIC_ENABLED: 'true' # 只在纠正、指代、事实声称或明显重复等高风险轮检查草稿。
      XIAOYOU_SELECTIVE_CRITIC_MODEL: 'qwen3.7-plus' # 高风险轻量审查模型；普通闲聊不会调用。
      XIAOYOU_SELECTIVE_CRITIC_ENABLE_THINKING: 'false' # 审查只判断明确错误，不运行慢思考。
      XIAOYOU_SELECTIVE_CRITIC_TIMEOUT: '25' # 审查失败时保留原草稿，不阻断回复。

      # ===== 连续输入合并 =====
      XIAOYOU_INPUT_MERGE_ENABLED: 'true' # 将短时间连续消息合成同一轮，并废弃思考中的旧回复。
      XIAOYOU_INPUT_SETTLE_SECONDS: '4.0' # 最后一条输入后等待4秒，覆盖自然连续补话；快速路由会抵消新增等待。
      XIAOYOU_INPUT_MAX_MESSAGES: '8' # 单轮最多合并8条连续消息，防止无限堆积。
      XIAOYOU_INPUT_MAX_CHARS: '2400' # 单轮合并文本最多2400字符，超出部分不继续合并。

      # ===== 模型中断重连 =====
      XIAOYOU_RECONNECT_ENABLED: 'true' # 模型截断或临时失败时允许稍后自然接回对话。
      XIAOYOU_RECONNECT_DELAY_SECONDS: '20' # 首次重连接话前等待20秒，让临时故障先恢复。
      XIAOYOU_RECONNECT_CHECK_INTERVAL: '3' # 每3秒检查一次待重连任务是否到期或已被新输入取消。
      XIAOYOU_RECONNECT_MAX_ATTEMPTS: '3' # 同一中断最多尝试3次，防止故障时无限请求。
      XIAOYOU_RECONNECT_BACKOFF_SECONDS: '45' # 重连失败后再次尝试前至少等待45秒。
      XIAOYOU_RECONNECT_MODEL: 'qwen3.7-max' # 负责恢复上下文并继续回复的模型。
      XIAOYOU_RECONNECT_ENABLE_THINKING: 'true' # 重连接话启用思考，便于理解中断前上下文。
      XIAOYOU_RECONNECT_TIMEOUT: '45' # 单次重连模型请求最多等待45秒。
      XIAOYOU_RECONNECT_MEMORY_TOP_N: '10' # 重连时最多注入10条相关长期记忆。
      XIAOYOU_RECONNECT_MAX_PARTS: '4' # 重连回复最多拆成4个微信气泡。
      XIAOYOU_RECONNECT_PART_DELAY_SECONDS: '1.0' # 重连气泡之间额外等待1秒。

      # ===== 图片/生活照统一语义路由 =====
      XIAOYOU_PHOTO_ROUTE_MODEL: 'qwen3.7-plus' # 统一判断新生活照请求、用户图片补话和普通聊天的轻量模型。
      XIAOYOU_PHOTO_ROUTE_ENABLE_THINKING: 'false' # 路由关闭思考以控制每轮延迟；判断依据仍是完整语义而非关键词。
      XIAOYOU_PHOTO_ROUTE_TIMEOUT: '20' # 单次照片语义路由最多等待20秒；失败时绝不触发生图。
      XIAOYOU_PHOTO_ROUTE_CONTEXT_MAX_CHARS: '3500' # 路由最多读取3500字符的近期聊天上下文。

      # ===== 小悠生活照 =====
      XIAOYOU_LIFE_PHOTO_ENABLED: 'true' # 启用生活照意图判断、画面规划、Seedream生成与微信发送。
      XIAOYOU_LIFE_PHOTO_PLANNER_MODEL: 'qwen3.7-max' # 结合语境、人格和记忆规划镜头与表情的模型。
      XIAOYOU_LIFE_PHOTO_PLANNER_ENABLE_THINKING: 'true' # 生活照规划启用思考，复杂姿势更稳但耗时更长。
      XIAOYOU_LIFE_PHOTO_PLANNER_TIMEOUT: '75' # 规划请求最多等待75秒；常见耗时约25至35秒。
      XIAOYOU_LIFE_PHOTO_CONTEXT_MAX_CHARS: '9000' # 规划时注入的上下文最多9000字符。
      XIAOYOU_LIFE_PHOTO_MEMORY_TOP_N: '16' # 规划时最多检索16条相关长期记忆。
      SEEDREAM_API_KEY: '${SEEDREAM_KEY}' # 火山方舟图片生成密钥，来自 .env 的 SEEDREAM_KEY，禁止写死。
      SEEDREAM_API_BASE: 'https://ark.cn-beijing.volces.com/api/v3' # 火山方舟图片生成 API 根地址。
      SEEDREAM_MODEL: 'doubao-seedream-5-0-lite-260128' # 当前使用的 Seedream 模型接入点名称。
      XIAOYOU_LIFE_PHOTO_SIZE: '2K' # 生成分辨率档位；提高会增加耗时与费用。
      XIAOYOU_LIFE_PHOTO_OUTPUT_FORMAT: 'jpeg' # 保存和发送格式，可用 jpeg 或 png；jpeg体积更小。
      XIAOYOU_LIFE_PHOTO_TIMEOUT: '240' # 单次Seedream最多等待240秒；超时后不盲目重试，避免重复计费。
      XIAOYOU_LIFE_PHOTO_PROACTIVE_ENABLED: 'true' # 允许小悠在合适语境主动分享生活照。
      # ===== 长期记忆：本地 SQLite + 模型语义向量 =====
      LONG_MEMORY_ENABLED: 'true' # 启用本地长期记忆写入与语义检索。
      LONG_MEMORY_DB_PATH: '/app/data/long_memory/memories.db' # 长期记忆正文与向量数据库；由 data 挂载持久化。
      LONG_MEMORY_USER_ID: 'yoyo' # 本地数据库中的固定用户ID，应与稳定会话ID保持一致。
      LONG_MEMORY_MAX_RESULTS: '5' # 单轮最多注入5条长期记忆。
      LONG_MEMORY_NORMAL_CHAT_RESULTS: '4' # 一般完整消息最多注入4条长期记忆。
      LONG_MEMORY_RECALL_RESULTS: '5' # 明确回忆、偏好或约定场景最多注入5条。
      LONG_MEMORY_MIN_SIMILARITY: '0.30' # 模型向量相似度低于此值的记忆不注入。
      LONG_MEMORY_MAX_SCAN: '2000' # 单次本地语义排序最多读取2000条，限制内存占用。
      LONG_MEMORY_BACKFILL_BATCH_SIZE: '30' # 旧治理账本迁入后，后台每批补建30条向量，不阻塞聊天。
      LONG_MEMORY_SQLITE_TIMEOUT: '8' # SQLite锁等待上限；失败时不阻塞主回复。
      LONG_MEMORY_EMBEDDING_MODEL: 'text-embedding-v4' # 仅计算语义向量；记忆正文仍只保存在本地数据库。
      LONG_MEMORY_EMBEDDING_DIMENSIONS: '512' # 提升相近个人记忆的语义区分度；本地开销仍很小。
      LONG_MEMORY_EMBEDDING_TIMEOUT: '8' # 单次语义向量请求超时；失败时跳过本轮长期记忆。
      LONG_MEMORY_EMBEDDING_API_KEY: '${KEY}' # 复用模型账号Key计算向量，不再连接阿里云记忆库。
      LONG_MEMORY_EMBEDDING_API_BASE: 'https://dashscope.aliyuncs.com/compatible-mode/v1' # OpenAI兼容Embedding接口。
      LONG_MEMORY_GOVERNANCE_ENABLED: 'true' # 用户原话先经模型提取和证据治理，再写入本地数据库。
      MEMORY_GOVERNANCE_STATE_PATH: '/app/data/xiaoyou_memory/memory_governance.json' # 本地候选、证据和写入结果审计账本。
      MEMORY_GOVERNANCE_MODEL: 'qwen3.7-plus' # 后台记忆候选提取模型，不占用主回复链路。
      MEMORY_GOVERNANCE_ENABLE_THINKING: 'false' # 候选提取关闭思考以控制费用；严格校验在代码层完成。
      MEMORY_GOVERNANCE_TIMEOUT: '45' # 单次后台候选提取最长等待45秒，失败时不写入。
      MEMORY_GOVERNANCE_MIN_CONFIDENCE: '0.82' # 模型置信度低于0.82的候选拒绝写入。
      MEMORY_GOVERNANCE_MIN_IMPORTANCE: '0.68' # 长期价值低于0.68的候选拒绝写入。
