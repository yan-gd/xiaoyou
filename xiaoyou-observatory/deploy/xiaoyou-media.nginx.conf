# Optional dedicated video origin for media.yoyoyan.cn.
# Put this behind a CDN and keep the observatory API on xiaoyou.yoyoyan.cn.
server {
    listen 80;
    listen [::]:80;
    server_name media.yoyoyan.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name media.yoyoyan.cn;

    root /www/wwwroot/xiaoyou-observatory;

    ssl_certificate     /www/server/panel/vhost/cert/media.yoyoyan.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/media.yoyoyan.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    server_tokens off;

    # Only the four public cinematic background files are exposed by this host.
    location ~* ^/(?:xiaoyou-(?:desktop|mobile)|xiaoyou[34])\.mp4$ {
        try_files $uri =404;
        limit_except GET HEAD { deny all; }
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header Accept-Ranges "bytes" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "https://xiaoyou.yoyoyan.cn" always;
    }

    location / {
        return 404;
    }

    location ~ /\. {
        deny all;
    }
}
