# BaoTa site configuration for xiaoyou.yoyoyan.cn.
# Certificate paths are BaoTa's usual Let's Encrypt locations; confirm them in the SSL panel.
server {
    listen 80;
    listen [::]:80;
    server_name xiaoyou.yoyoyan.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name xiaoyou.yoyoyan.cn;

    root /www/wwwroot/xiaoyou-observatory;
    index index.html;

    ssl_certificate     /www/server/panel/vhost/cert/xiaoyou.yoyoyan.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/xiaoyou.yoyoyan.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    client_max_body_size 16k;
    server_tokens off;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; manifest-src 'self'" always;

    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 75s;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
    }

    location = /index.html {
        expires -1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}
