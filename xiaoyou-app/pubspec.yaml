name: xiaoyou_app
description: Xiaoyou's private mobile companion client.
publish_to: none
version: 0.5.1+6

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.8.1
  flutter_local_notifications: ^19.5.0
  flutter_secure_storage: ^10.3.1
  image_picker: ^1.2.3
  local_auth: ^3.0.2
  path_provider: ^2.1.5
  record: ^7.1.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/xiaoyou-avatar.png
